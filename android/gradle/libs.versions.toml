# AndroidX Work
androidx-work-runtime = { group = "androidx.work", name = "work-runtime", version.ref = "androidxWork" }

# AndroidX Palette
androidx-palette = { group = "androidx.palette", name = "palette", version.ref = "androidxPalette" }

