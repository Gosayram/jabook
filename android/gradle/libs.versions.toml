# AndroidX Core
androidxCore = "1.13.1"
androidxCoreSplashscreen = "1.2.0"
androidxActivity = "1.12.1"
androidxAppcompat = "1.7.1"
androidxMedia = "1.7.1"

# AndroidX Lifecycle
androidxLifecycle = "2.10.0"

# AndroidX Compose
androidxComposeBom = "2025.12.00"
androidxComposeMaterial3Adaptive = "1.3.0-alpha05"
