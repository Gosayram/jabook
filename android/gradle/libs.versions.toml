]

room = [
    "androidx-room-runtime",
    "androidx-room-ktx",
]

datastore = [
    "androidx-datastore",
    "androidx-datastore-preferences",
]

libtorrent4j = [
    "libtorrent4j",
    "libtorrent4j-android-arm64",
    "libtorrent4j-android-arm",
