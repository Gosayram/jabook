name: Build Matrix

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [dev, stage, beta]
        build_type: [debug, release]
        exclude:
          # Release builds require signing credentials not available on PRs from forks
          - build_type: release
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.configuration-cache.read-only=true
        -Dorg.gradle.dependency.verification.console=verbose
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up JDK 21
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Capitalize build type
        id: caps
        run: |
          FLAVOR="${{ matrix.flavor }}"
          BUILD_TYPE="${{ matrix.build_type }}"
          FLAVOR_CAP="${FLAVOR^}"
          BUILD_CAP="${BUILD_TYPE^}"
          echo "flavor_cap=${FLAVOR_CAP}" >> "$GITHUB_OUTPUT"
          echo "build_cap=${BUILD_CAP}" >> "$GITHUB_OUTPUT"
          echo "task=assemble${FLAVOR_CAP}${BUILD_CAP}" >> "$GITHUB_OUTPUT"

      - name: Assemble ${{ matrix.flavor }} ${{ matrix.build_type }}
        run: |
          cd android
          ./gradlew :app:${{ steps.caps.outputs.task }} \
            --no-configuration-cache \
            --parallel \
            --build-cache \
            -Pandroid.enableR8.fullMode=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-${{ matrix.build_type }}
          path: android/app/build/outputs/apk/${{ matrix.flavor }}/${{ matrix.build_type }}/**/*.apk
          retention-days: 7
          if-no-files-found: warn
