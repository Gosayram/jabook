# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  review_status: true
  review_details: true
  commit_status: true
  fail_commit_status: false
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: true
  collapse_walkthrough: true
  disable_cache: false
  abort_on_close: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
      - "[skip-coderabbit]"

  path_filters:
    - "!**/build/**"
    - "!**/.gradle/**"
    - "!test_results/**"
    - "!startup_profile.log"
    - "!**/*.keystore"
    - "!**/*.jks"
    - "!**/*.apk"
    - "!**/*.aab"

  path_instructions:
    - path: "android/**/*.kt"
      instructions: |
        Prioritize correctness and runtime safety for Android/Kotlin:
        - Flag coroutine misuse (GlobalScope, leaked scopes, blocking main thread, missing cancellation handling).
        - Flag Compose stability/recomposition risks and state-hoisting mistakes.
        - Flag Room/DataStore migration or schema-compatibility risks.
        - Flag Media3/audio lifecycle regressions (focus, service lifecycle, listener cleanup, process-death restore).
        - Flag security issues (intent validation, URI parsing, storage access, crypto misuse, logging secrets).
        Request tests for non-trivial logic changes.

    - path: ".github/workflows/**/*.yml"
      instructions: |
        Review CI/CD hardening:
        - Pin GitHub Actions to commit SHAs.
        - Principle of least privilege in workflow permissions.
        - No plaintext secrets or insecure shell patterns.
        - Validate release/signing steps and artifact integrity assumptions.

    - path: "scripts/**/*.sh"
      instructions: |
        Focus on shell safety and portability:
        - Proper quoting and error handling (`set -euo pipefail` where applicable).
        - Avoid unsafe globbing/word-splitting.
        - Validate input paths and avoid destructive behavior by default.

    - path: "android/app/src/main/proto/**/*.proto"
      instructions: |
        Check backward compatibility for persisted settings/schema fields:
        - Avoid field renumbering/removal without migration strategy.
        - Preserve compatibility guarantees for existing installations.

    - path: "docs/**/*.md"
      instructions: |
        Check technical accuracy and consistency with the current codebase and CI commands.
        Call out stale commands/paths and ambiguous operational steps.

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: false

  pre_merge_checks:
    docstrings:
      mode: "off"
    title:
      mode: "warning"
      requirements: >-
        Use clear imperative style, include scope when possible
        (e.g. audio:, ci:, storage:), and keep title concise.
    description:
      mode: "warning"
    issue_assessment:
      mode: "warning"
    custom_checks:
      - name: "Android Quality Gates"
        mode: "warning"
        instructions: |
          Pass only if PR changes align with repository quality gates:
          - Kotlin/Android code changes should include or update tests where behavior changed.
          - CI-impacting changes should keep `make lint-kotlin`, `make compile`, and `make test` valid.
          - Flag risky changes that bypass existing static checks (ktlint/detekt) without justification.
      - name: "Security Sensitive Changes"
        mode: "warning"
        instructions: |
          For changes touching auth, storage permissions, intent handling, network config, cryptography, or backup:
          - Ensure no sensitive data is logged.
          - Ensure input validation and explicit error handling are present.
          - Ensure behavior does not silently weaken existing security controls.

tools:
  detekt:
    enabled: true
    config_file: "default-detekt-config.yml"
  markdownlint:
    enabled: true
  yamllint:
    enabled: true
  shellcheck:
    enabled: true
  checkmake:
    enabled: true
  gitleaks:
    enabled: true
  trufflehog:
    enabled: true

chat:
  auto_reply: true
  allow_non_org_members: false

knowledge_base:
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "CONTRIBUTING.md"
      - "README.md"
      - "docs/adr/**/*.md"
