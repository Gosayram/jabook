config:
  validation: true
  warningsAsErrors: false
  excludes: ''

build:
  maxIssues: 0
  excludeCorrectable: false

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedFindingsReport'

output-reports:
  active: true
  exclude: []

comments:
  active: false

complexity:
  active: false

naming:
  active: false

potential-bugs:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true

coroutines:
  active: false

performance:
  active: false

style:
  active: false

# We already use ktlint, so keep detekt focused on bug-prone rules.
formatting:
  active: false
